[variables]
NIXPACKS_NODE_VERSION = "20"

[phases.install]
# Remove the lock file and use a plain install so platform-specific
# optional deps (e.g. @emnapi/*, @tailwindcss/oxide) resolve correctly
# on Railway's build platform. Avoids `npm ci` lock-mismatch failures.
cmds = ["rm -f package-lock.json && npm install --no-audit --no-fund"]

[phases.build]
# Explicitly remove any cached .next build before rebuilding
# This ensures CSS/font changes are never served from a stale cache
cmds = ["rm -rf .next && npm run build"]

[start]
cmd = "npm run db:migrate:deploy && npm start"
